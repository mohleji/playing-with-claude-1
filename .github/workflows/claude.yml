name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  # Triggered by Jira Automation via GitHub API
  repository_dispatch:
    types: [jira-task]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: '--allowedTools Bash,Edit,Write,Read,Glob,Grep'
          # For Jira-triggered runs, build the prompt from the dispatch payload.
          # For GitHub-triggered runs (issue comments etc.), leave prompt empty
          # so Claude uses the comment/issue body as the prompt.
          prompt: |
            ${{ github.event_name == 'repository_dispatch' &&
              format(
                'Jira ticket {0}: {1}\n\nDescription:\n{2}\n\nJira URL: {3}\n\nImplement this task following the conventions in CLAUDE.md. Create a feature branch named claude/{0}-{4}, write the code, add tests, and open a pull request.',
                github.event.client_payload.ticket_id,
                github.event.client_payload.title,
                github.event.client_payload.description,
                github.event.client_payload.url,
                github.event.client_payload.slug
              ) || '' }}
