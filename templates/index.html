<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave and Busters</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">☀️ Light</button>
    <main class="landing">
        <h1 class="landing__title">Dave and Busters</h1>
        <p class="landing__subtitle">Pick a game and start playing</p>
        <ul class="game-grid">
            {% for game in games %}
            <li>
                <a href="{{ url_for('game', slug=game.slug) }}" class="game-card">
                    <img
                        class="game-card__icon"
                        src="{{ url_for('static', filename='images/' + game.icon) }}"
                        alt="{{ game.name }} icon"
                    >
                    <span class="game-card__name">{{ game.name }}</span>
                    <span class="game-card__description">{{ game.description }}</span>
                </a>
            </li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
