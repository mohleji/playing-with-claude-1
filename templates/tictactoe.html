<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe — Dave and Busters</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">☀️ Light</button>
    <main class="game-page">
        <header class="game-page__header">
            <h1 class="game-page__title">Tic-Tac-Toe</h1>
            <a href="{{ url_for('index') }}" class="game-page__back">Back to Games</a>
        </header>
        <div id="game-container"></div>
        <p id="status" class="game-page__status"></p>
        <button id="restart" class="game-page__restart">Restart</button>
    </main>
    <script src="{{ url_for('static', filename='js/tictactoe.js') }}"></script>
</body>
</html>
