<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake — Game Arcade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="game-page">
        <header class="game-page__header">
            <h1 class="game-page__title">Snake</h1>
            <a href="{{ url_for('index') }}" class="game-page__back">Back to Games</a>
        </header>
        <div class="game-page__canvas-wrap">
            <canvas id="game-canvas" width="400" height="400"></canvas>
        </div>
        <p id="score" class="game-page__score">Score: 0</p>
        <button id="restart" class="game-page__restart">Restart</button>
    </main>
    <script src="{{ url_for('static', filename='js/snake.js') }}"></script>
</body>
</html>
